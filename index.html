<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Paper Scissor Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🪨 Stone Paper Scissor ✂️</h1>

<div class="choices">
    <button class="stone" onclick="play('stone')">Stone</button>
    <button class="paper" onclick="play('paper')">Paper</button>
    <button class="scissor" onclick="play('scissor')">Scissor</button>
</div>

<div id="result">Choose your move</div>

<div class="score">
    You: <span id="userScore">0</span> |
    Computer: <span id="compScore">0</span>
</div>

<button id="reset" onclick="resetGame()">Reset</button>

<script src="script.js"></script>
</body>
</html>
